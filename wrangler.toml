name = "financial-daily"
main = "src/index.js"
compatibility_date = "2025-05-20"
workers_dev = true

kv_namespaces = [
  { binding = "DATA_KV", id = "你的KV命名空间ID" }
]

[vars]
IMG_PROXY = ""
OPEN_TRANSLATE = "false"
USE_MODEL_PLATFORM = "GEMINI"
GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta"
DEFAULT_GEMINI_MODEL = "gemini-2.0-flash"
FOLO_COOKIE_KV_KEY = "folo_auth_cookie"
FOLO_DATA_API = "https://api.follow.is/entries"
FOLO_FILTER_DAYS = "3"
GITHUB_REPO_OWNER = "你的GitHub用户名"
GITHUB_REPO_NAME = "你的仓库名"
GITHUB_BRANCH = "main"
LOGIN_USERNAME = "admin"
DAILY_TITLE = "金融日报"
DAILY_TITLE_MIN = "金融日报"
INSERT_FOOT = "false"
INSERT_AD = "false"
STOCK_WATCH_LIST = "VOO,QQQ,SPY,GLD,TLT,SGOV,NVDA,TSLA,AAPL,MSFT,GOOGL,AMZN,META"

# ⚠️ 敏感信息请使用 wrangler secret put 命令设置，不要写在这里！
# 需要设置的 Secrets:
# - GEMINI_API_KEY
# - GITHUB_TOKEN
# - LOGIN_PASSWORD
