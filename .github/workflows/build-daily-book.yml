name: Build Financial Daily

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Wait for deployment
        run: sleep 30

      - name: Trigger data fetch
        run: |
          TODAY_DATE=$(TZ="Asia/Shanghai" date +%Y-%m-%d)
          WRITE_URL="${{ vars.WRITE_RSS_URL }}?date=$TODAY_DATE"
          echo "Triggering: $WRITE_URL"
          curl -fsS --retry 3 --retry-delay 5 "$WRITE_URL"

      - name: Archive old notes
        run: |
          echo "归档旧的日报..."
          LATEST_DAILY_FILE=$(find daily -type f -name "*.md" 2>/dev/null | sort -r | head -n 1)
          if [ -z "$LATEST_DAILY_FILE" ]; then
            echo "没有找到旧的日报文件"
            exit 0
          fi
          
          LATEST_MONTH=$(basename "$LATEST_DAILY_FILE" .md | cut -d'-' -f1,2)
          echo "当前月份: $LATEST_MONTH"

          for file in daily/*.md 2>/dev/null; do
            [ -e "$file" ] || continue
            FILE_MONTH=$(basename "$file" .md | cut -d'-' -f1,2)
            if [ "$FILE_MONTH" != "$LATEST_MONTH" ]; then
              TARGET_DIR="daily/$FILE_MONTH"
              mkdir -p "$TARGET_DIR"
              echo "归档: $file -> $TARGET_DIR/"
              mv "$file" "$TARGET_DIR/"
            fi
          done

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily/ today/
          if git diff --staged --quiet; then
            echo "没有变更"
          else
            git commit -m "docs: 自动生成金融日报 $(date -u +%Y-%m-%d)"
            git push
          fi
