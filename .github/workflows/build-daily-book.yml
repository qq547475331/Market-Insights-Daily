name: Generate Financial Daily Report

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Wait for deployment
        run: sleep 30

      - name: Fetch data and generate report
        run: |
          TODAY=$(TZ="Asia/Shanghai" date +%Y-%m-%d)
          WORKER_URL="${{ vars.WORKER_URL }}"
          
          echo "Fetching data for $TODAY..."
          curl -fsS "${WORKER_URL}/writeData?date=${TODAY}" || echo "Data fetch completed"
          
          echo "Waiting for data processing..."
          sleep 10
          
          echo "Generating AI report..."
          curl -fsS "${WORKER_URL}/generateRssContent?date=${TODAY}" || echo "Report generation completed"

      - name: Archive old reports
        run: |
          echo "Archiving old reports..."
          
          if [ -d "daily" ]; then
            LATEST_FILE=$(find daily -type f -name "*.md" 2>/dev/null | sort -r | head -n 1)
            if [ -n "$LATEST_FILE" ]; then
              LATEST_MONTH=$(basename "$LATEST_FILE" .md | cut -d'-' -f1,2)
              
              for file in daily/*.md 2>/dev/null; do
                [ -e "$file" ] || continue
                FILE_MONTH=$(basename "$file" .md | cut -d'-' -f1,2)
                if [ "$FILE_MONTH" != "$LATEST_MONTH" ]; then
                  TARGET_DIR="daily/$FILE_MONTH"
                  mkdir -p "$TARGET_DIR"
                  mv "$file" "$TARGET_DIR/"
                fi
              done
            fi
          fi

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily/ rss/ today/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: 自动生成金融日报 $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
            git push
          fi
